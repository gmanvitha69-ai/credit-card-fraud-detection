<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>

        body{
            background:#141e30;
            font-family:Arial;
            margin:0;
            padding:0;
        }

        .login-container{
            width:400px;
            background:white;
            margin:80px auto;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            color:#243b55;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin:12px 0;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#243b55;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#141e30;
        }

        .credentials{
            margin-top:25px;
            color:gray;
            font-size:14px;
        }

        .message{
            margin-top:20px;
            font-size:18px;
            color:red;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="/">Home</a>

        <a href="/history">History</a>

        <a href="/dashboard">Dashboard</a>

        <a href="/login">Login</a>

    </div>

    <div class="login-container">

        <h1>Admin Login</h1>

        <form action="/login" method="post">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        {% if message %}

        <div class="message">

            {{ message }}

        </div>

        {% endif %}

        <div class="credentials">

            Demo Credentials:<br><br>

            Username: admin<br>
            Password: admin123

        </div>

    </div>

</body>

</html>
