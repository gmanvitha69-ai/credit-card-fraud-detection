<!DOCTYPE html>
<html>

<head>
    <title>Prediction History</title>

    <style>

        body{
            font-family: Arial;
            background:#141e30;
            color:white;
            text-align:center;
        }

        table{
            margin:auto;
            border-collapse: collapse;
            width:80%;
            background:white;
            color:black;
        }

        th, td{
            border:1px solid black;
            padding:12px;
        }

        th{
            background:#243b55;
            color:white;
        }

        h1{
            margin-top:30px;
        }

    </style>

</head>

<body>

    <h1>Prediction History</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Amount</th>
            <th>Result</th>
        </tr>

        {% for row in rows %}

        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>

</html>
