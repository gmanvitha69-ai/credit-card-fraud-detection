<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Credit Card Fraud Detection</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>

        .container{
            width:450px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            text-align:center;
            margin:50px auto;
            color:black;
        }

        h1{
            margin-bottom:30px;
            color:#243b55;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#243b55;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#141e30;
        }

        .result{
            margin-top:20px;
            font-size:28px;
            color:red;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="/">Home</a>

        <a href="/history">History</a>

        <a href="/dashboard">Dashboard</a>

    </div>

    <div class="container">

        <h1>AI Credit Card Fraud Detection</h1>

        <form action="/predict" method="post">

            <input
                type="text"
                name="Time"
                placeholder="Transaction Time"
                required
            >

            <input
                type="text"
                name="V1"
                placeholder="V1"
                required
            >

            <input
                type="text"
                name="V2"
                placeholder="V2"
                required
            >

            <input
                type="text"
                name="V3"
                placeholder="V3"
                required
            >

            <input
                type="text"
                name="Amount"
                placeholder="Transaction Amount"
                required
            >

            <button type="submit">
                Predict Fraud
            </button>

        </form>

        <div class="result">

            {{ prediction_text }}

        </div>

    </div>

</body>

</html>
